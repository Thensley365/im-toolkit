<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antibiotic Advisor — IDSA/ATS/AHA/SSC Evidence-Based</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --bg2: #111827;
    --bg3: #1a2235;
    --bg4: #1e2d45;
    --border: #2a3a5c;
    --teal: #0d9488;
    --teal-light: #14b8a6;
    --teal-dim: #0d948822;
    --navy: #1e40af;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --red: #ef4444;
    --red-dim: #ef444422;
    --yellow: #f59e0b;
    --yellow-dim: #f59e0b22;
    --green: #22c55e;
    --green-dim: #22c55e22;
    --orange: #f97316;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

  /* ── Header ── */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  .header-icon { font-size: 22px; }
  .header h1 { font-size: 17px; font-weight: 600; color: var(--teal-light); }
  .header p { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .header-badge { margin-left: auto; background: var(--teal-dim); border: 1px solid var(--teal); color: var(--teal-light); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }

  /* ── Tabs ── */
  .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; }
  .tab { padding: 13px 22px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-dim); transition: all 0.2s; white-space: nowrap; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--teal-light); border-bottom-color: var(--teal-light); }

  /* ── Main layout ── */
  .main { display: flex; height: calc(100vh - 110px); overflow: hidden; }
  .sidebar { width: 280px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; flex-shrink: 0; }
  .content { flex: 1; overflow-y: auto; padding: 20px 24px; }

  /* ── Search ── */
  .search-box { position: relative; margin-bottom: 14px; }
  .search-box input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px 9px 36px; color: var(--text); font-size: 13px; outline: none; font-family: inherit; }
  .search-box input:focus { border-color: var(--teal); }
  .search-box::before { content: "⌕"; position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; pointer-events: none; }

  /* ── List items ── */
  .list-item { padding: 9px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 3px; font-size: 12.5px; color: var(--text-dim); transition: all 0.15s; border: 1px solid transparent; }
  .list-item:hover { background: var(--bg3); color: var(--text); }
  .list-item.active { background: var(--teal-dim); border-color: var(--teal); color: var(--teal-light); }
  .list-item .tag { font-size: 10px; color: var(--text-muted); display: block; margin-top: 1px; font-family: 'JetBrains Mono', monospace; }

  /* ── Panel tab switching ── */
  .panel { display: none; }
  .panel.active { display: flex; height: 100%; overflow: hidden; }

  /* ── Content blocks ── */
  .result-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text-muted); }
  .result-empty .icon { font-size: 48px; opacity: 0.3; }

  .card { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
  .card-header { padding: 12px 16px; background: var(--bg4); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--teal-light); }
  .card-body { padding: 14px 16px; }

  .drug-name { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .drug-class { font-size: 12px; color: var(--teal-light); font-weight: 500; margin-bottom: 14px; }

  .info-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 6px; }
  .info-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; min-width: 80px; }
  .info-val { font-size: 13px; color: var(--text); font-family: 'JetBrains Mono', monospace; }

  .section-heading { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin: 14px 0 8px; }

  .adr-item { padding: 5px 10px; font-size: 12px; color: var(--text-dim); border-left: 2px solid var(--border); margin-bottom: 4px; }

  .ci-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; margin-bottom: 5px; }
  .ci-badge.high { background: var(--red-dim); border: 1px solid var(--red); color: #fca5a5; }
  .ci-badge.moderate { background: var(--yellow-dim); border: 1px solid var(--yellow); color: #fde68a; }
  .ci-badge.low { background: var(--green-dim); border: 1px solid var(--green); color: #86efac; }
  .ci-item { margin-bottom: 8px; }
  .ci-desc { font-size: 12px; color: var(--text); margin-bottom: 3px; }

  .alt-box { background: var(--teal-dim); border: 1px solid var(--teal); border-radius: 6px; padding: 10px 12px; font-size: 12px; color: var(--text); margin-top: 10px; }
  .alt-label { font-weight: 600; color: var(--teal-light); display: block; margin-bottom: 3px; font-size: 11px; text-transform: uppercase; }

  /* ── Contraindication screener ── */
  .screener { background: var(--bg4); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 14px; }
  .screener h3 { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .ci-check { display: flex; align-items: center; gap: 9px; padding: 6px 4px; border-radius: 5px; cursor: pointer; transition: background 0.1s; }
  .ci-check:hover { background: var(--bg3); }
  .ci-check input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--teal); cursor: pointer; }
  .ci-check label { font-size: 12.5px; color: var(--text-dim); cursor: pointer; flex: 1; }
  .ci-check label.checked { color: var(--text); }
  .screener-result { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; display: none; }
  .ci-flag { padding: 8px 10px; background: var(--red-dim); border: 1px solid var(--red); border-radius: 6px; margin-bottom: 8px; }
  .ci-flag .drug-label { font-size: 11px; font-weight: 600; color: #fca5a5; margin-bottom: 3px; }
  .ci-flag .ci-reason { font-size: 12px; color: var(--text); }
  .ci-flag .ci-sev { font-size: 10px; color: #f87171; margin-top: 2px; }
  .ci-ok { padding: 8px 10px; background: var(--green-dim); border: 1px solid var(--green); border-radius: 6px; font-size: 12px; color: #86efac; }

  /* ── Infection view ── */
  .regimen-card { background: var(--bg4); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .regimen-label { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-bottom: 10px; }
  .regimen-label.first { background: #16a34a22; border: 1px solid #16a34a; color: #86efac; }
  .regimen-label.second { background: #1d4ed822; border: 1px solid #3b82f6; color: #93c5fd; }
  .regimen-label.alt { background: #7c3aed22; border: 1px solid #8b5cf6; color: #c4b5fd; }
  .regimen-label.add { background: #b45309aa; border: 1px solid #f59e0b; color: #fde68a; }

  .drug-pill { display: inline-flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--text); margin: 2px; cursor: pointer; transition: all 0.15s; }
  .drug-pill:hover { border-color: var(--teal); color: var(--teal-light); }
  .combo-sep { color: var(--text-muted); margin: 0 2px; font-size: 11px; font-weight: 600; }

  .duration-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; display: inline-block; }
  .source-cite { font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 6px; }
  .notes-text { font-size: 12px; color: var(--text-dim); margin-top: 6px; line-height: 1.5; }
  .pearl-box { background: #1e3a5f; border: 1px solid #3b82f6; border-radius: 6px; padding: 10px 12px; font-size: 12px; color: #bfdbfe; margin-bottom: 10px; }

  .org-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
  .org-tag { background: var(--bg4); border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px; font-size: 11px; color: var(--text-dim); }

  /* ── Organism view ── */
  .site-row { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .site-label { font-size: 11px; font-weight: 600; color: var(--text-muted); min-width: 140px; text-transform: uppercase; letter-spacing: 0.04em; }
  .site-val { font-size: 12.5px; color: var(--text); font-family: 'JetBrains Mono', monospace; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Renal alert ── */
  .renal-alert { display: flex; align-items: flex-start; gap: 6px; padding: 8px 10px; border-radius: 6px; font-size: 12px; margin-bottom: 6px; }
  .renal-alert.warn { background: var(--yellow-dim); border: 1px solid var(--yellow); color: #fde68a; }
  .renal-alert.crit { background: var(--red-dim); border: 1px solid var(--red); color: #fca5a5; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">💊</div>
  <div>
    <h1>Antibiotic Advisor</h1>
    <p>Evidence-based regimens — IDSA / ATS / AHA / SSC / AASLD guidelines</p>
  </div>
  <div class="header-badge">Educational Only</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('infection')">By Infection Type</div>
  <div class="tab" onclick="switchTab('organism')">By Organism</div>
  <div class="tab" onclick="switchTab('drug')">Drug Lookup</div>
</div>

<!-- ═══ TAB 1: By Infection ═══ -->
<div id="panel-infection" class="panel active">
  <div class="sidebar">
    <div class="search-box"><input type="text" id="inf-search" placeholder="Search infections..." oninput="filterList('inf')"></div>
    <div id="inf-list"></div>
  </div>
  <div class="content" id="inf-content">
    <div class="result-empty"><div class="icon">🦠</div><div>Select an infection type from the left</div></div>
  </div>
</div>

<!-- ═══ TAB 2: By Organism ═══ -->
<div id="panel-organism" class="panel">
  <div class="sidebar">
    <div class="search-box"><input type="text" id="org-search" placeholder="Search organisms..." oninput="filterList('org')"></div>
    <div id="org-list"></div>
  </div>
  <div class="content" id="org-content">
    <div class="result-empty"><div class="icon">🔬</div><div>Select an organism from the left</div></div>
  </div>
</div>

<!-- ═══ TAB 3: Drug Lookup ═══ -->
<div id="panel-drug" class="panel">
  <div class="sidebar">
    <div class="search-box"><input type="text" id="drug-search" placeholder="Search antibiotics..." oninput="filterList('drug')"></div>
    <div id="drug-list"></div>
  </div>
  <div class="content" id="drug-content">
    <div class="result-empty"><div class="icon">💉</div><div>Select an antibiotic from the left</div></div>
  </div>
</div>

// CONTRAINDICATION SCREENER
// ═══════════════════════════════════════════════════════════
const CI_SCREENER_OPTIONS = [
  {key: "pcn_allergy", label: "Penicillin allergy (immediate hypersensitivity / anaphylaxis)", drugCIs: {
    "Ampicillin": "HIGH", "Ampicillin-sulbactam": "HIGH", "Nafcillin": "HIGH", "Piperacillin-tazobactam": "HIGH",
    "Amoxicillin": "HIGH", "Amoxicillin-clavulanate": "HIGH", "Oxacillin": "HIGH", "Penicillin G": "HIGH"
  }},
  {key: "ceph_allergy", label: "Cephalosporin allergy", drugCIs: {
    "Cephalexin": "HIGH", "Cefazolin": "HIGH", "Cefotetan": "HIGH", "Cefoxitin": "HIGH",
    "Ceftriaxone": "HIGH", "Ceftazidime": "HIGH", "Cefepime": "HIGH", "Cefotaxime": "HIGH", "Ceftaroline": "HIGH"
  }},
  {key: "qtc", label: "QTc prolongation (QTc >500ms or concurrent QTc-prolonging drugs)", drugCIs: {
    "Ciprofloxacin": "HIGH", "Levofloxacin": "HIGH", "Moxifloxacin": "HIGH — highest QTc risk", "Azithromycin": "HIGH"
  }},
  {key: "renal", label: "Renal failure (CrCl <30 mL/min)", drugCIs: {
    "Nitrofurantoin": "ABSOLUTE — contraindicated", "Cefepime": "HIGH — neurotoxicity without dose adjustment",
    "Ceftazidime": "HIGH — encephalopathy risk", "Gentamicin": "HIGH — accumulation + nephrotoxicity",
    "Tobramycin": "HIGH — accumulation + nephrotoxicity", "Amikacin": "HIGH — accumulation + nephrotoxicity"
  }},
  {key: "hepatic", label: "Severe hepatic impairment", drugCIs: {
    "Azithromycin": "MODERATE", "Moxifloxacin": "HIGH — hepatotoxicity black box"
  }},
  {key: "pregnancy", label: "Pregnancy or breastfeeding", drugCIs: {
    "Ciprofloxacin": "HIGH", "Levofloxacin": "HIGH", "Moxifloxacin": "HIGH",
    "Doxycycline": "HIGH (2nd/3rd trimester)", "Nitrofurantoin": "HIGH (at term)"
  }},
  {key: "myasthenia", label: "Myasthenia gravis", drugCIs: {
    "Ciprofloxacin": "HIGH", "Levofloxacin": "HIGH", "Moxifloxacin": "HIGH",
    "Gentamicin": "HIGH", "Tobramycin": "HIGH", "Amikacin": "HIGH"
  }},
  {key: "ssri", label: "Concurrent SSRI / SNRI / MAOI or serotonergic agents", drugCIs: {
    "Linezolid": "HIGH — FDA black box: serotonin syndrome"
  }},
  {key: "daptomycin_lung", label: "Pulmonary source of infection / pneumonia", drugCIs: {
    "Daptomycin": "ABSOLUTE — inactivated by pulmonary surfactant"
  }},
  {key: "cdiff_hx", label: "History of C. difficile infection", drugCIs: {
    "Clindamycin": "HIGH — dramatically increases recurrence risk"
  }}
];

// ═══════════════════════════════════════════════════════════
// UI State
// ═══════════════════════════════════════════════════════════
let activeInfection = null;
let activeOrganism = null;
let activeDrug = null;
let currentPanel = 'infection';

function switchTab(name) {
  currentPanel = name;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['infection','organism','drug'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

// ── Build sidebar lists ──
function buildLists() {
  // Infection list
  const infList = document.getElementById('inf-list');
  Object.entries(INFECTION_DB).forEach(([key, inf]) => {
    const el = document.createElement('div');
    el.className = 'list-item';
    el.dataset.key = key;
    el.dataset.search = inf.display.toLowerCase();
    el.innerHTML = `${inf.display}`;
    el.onclick = () => showInfection(key);
    infList.appendChild(el);
  });

  // Organism list
  const orgList = document.getElementById('org-list');
  Object.entries(ORGANISM_DB).forEach(([key, org]) => {
    const el = document.createElement('div');
    el.className = 'list-item';
    el.dataset.key = key;
    el.dataset.search = org.display.toLowerCase();
    el.innerHTML = `${org.display}`;
    el.onclick = () => showOrganism(key);
    orgList.appendChild(el);
  });

  // Drug list
  const drugList = document.getElementById('drug-list');
  Object.keys(ANTIBIOTIC_DB).sort().forEach(name => {
    const drug = ANTIBIOTIC_DB[name];
    const el = document.createElement('div');
    el.className = 'list-item';
    el.dataset.key = name;
    el.dataset.search = (name + ' ' + drug.class).toLowerCase();
    el.innerHTML = `${name}<span class="tag">${drug.class.split(' — ')[0]}</span>`;
    el.onclick = () => showDrug(name);
    drugList.appendChild(el);
  });
}

function filterList(type) {
  const searchId = {inf: 'inf-search', org: 'org-search', drug: 'drug-search'}[type];
  const listId = {inf: 'inf-list', org: 'org-list', drug: 'drug-list'}[type];
  const q = document.getElementById(searchId).value.toLowerCase();
  document.querySelectorAll('#' + listId + ' .list-item').forEach(el => {
    el.style.display = el.dataset.search.includes(q) ? '' : 'none';
  });
}

function setActive(type, key) {
  const listId = {infection: 'inf-list', organism: 'org-list', drug: 'drug-list'}[type];
  document.querySelectorAll('#' + listId + ' .list-item').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });
}

// ── Infection display ──
function regimenLabelClass(label) {
  label = label.toLowerCase();
  if (label.includes('first')) return 'first';
  if (label.includes('second') || label.includes('alternative')) return 'second';
  if (label.includes('add if') || label.includes('add for') || label.includes('replace')) return 'add';
  return 'alt';
}

function showInfection(key) {
  activeInfection = key;
  setActive('infection', key);
  const inf = INFECTION_DB[key];
  const content = document.getElementById('inf-content');

  let regimensHtml = inf.regimens.map(r => {
    const labelCls = regimenLabelClass(r.label);
    let drugsHtml = '';
    if (r.drugs.length === 0) {
      drugsHtml = '<span style="color:var(--yellow);font-weight:600;">NO ANTIBIOTICS REQUIRED</span>';
    } else if (r.combo) {
      drugsHtml = r.drugs.map(d => `<span class="drug-pill" onclick="switchTab('drug');showDrug('${d}')" title="Click to view ${d}">${d}</span>`).join('<span class="combo-sep">+</span>');
    } else {
      drugsHtml = r.drugs.map(d => `<span class="drug-pill" onclick="switchTab('drug');showDrug('${d}')" title="Click to view ${d}">${d}</span>`).join('');
    }
    return `<div class="regimen-card">
      <div class="regimen-label ${labelCls}">${r.label}</div>
      <div style="margin-bottom:8px;display:flex;flex-wrap:wrap;align-items:center;gap:2px;">${drugsHtml}</div>
      <div class="duration-badge">⏱ ${r.duration}</div>
      ${r.notes ? `<div class="notes-text">📌 ${r.notes}</div>` : ''}
      <div class="source-cite">${r.source}</div>
    </div>`;
  }).join('');

  let pearlsHtml = '';
  if (inf.pearls && inf.pearls.length > 0) {
    pearlsHtml = inf.pearls.map(p => `<div class="pearl-box">${p}</div>`).join('');
  }

  const regimenDrugs = [...new Set(inf.regimens.flatMap(r => r.drugs))].filter(d => ANTIBIOTIC_DB[d]);

  let screenerHtml = buildScreener(regimenDrugs);

  content.innerHTML = `
    <div class="drug-name" style="font-size:20px;">${inf.display}</div>
    <div class="org-tags" style="margin:10px 0 16px;">
      <span style="font-size:11px;color:var(--text-muted);margin-right:4px;">COMMON BUGS:</span>
      ${inf.organisms.map(o => `<span class="org-tag">${o}</span>`).join('')}
    </div>
    ${pearlsHtml}
    <div class="section-heading">Treatment Regimens</div>
    ${regimensHtml}
    ${screenerHtml}
  `;
}

// ── Organism display ──
function showOrganism(key) {
  activeOrganism = key;
  setActive('organism', key);
  const org = ORGANISM_DB[key];
  const content = document.getElementById('org-content');

  const firstLineRows = Object.entries(org.first_line).map(([site, drug]) =>
    `<div class="site-row"><div class="site-label">${site}</div><div class="site-val">${drug}</div></div>`
  ).join('');

  const secondLineHtml = org.second_line.map(d => `<div class="adr-item">${d}</div>`).join('');

  content.innerHTML = `
    <div class="drug-name" style="font-size:20px;">${org.display}</div>
    <div class="org-tags" style="margin:10px 0 16px;">
      ${org.infections.map(i => `<span class="org-tag">${i}</span>`).join('')}
    </div>
    ${org.key_pearl ? `<div class="pearl-box" style="margin-bottom:16px;">⚠ <strong>Key Pearl:</strong> ${org.key_pearl}</div>` : ''}
    <div class="card">
      <div class="card-header"><span class="card-title">First-Line Treatment by Site</span></div>
      <div class="card-body">${firstLineRows}</div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Second-Line / Alternatives</span></div>
      <div class="card-body">${secondLineHtml}</div>
    </div>
  `;
}

// ── Drug display ──
function showDrug(name) {
  activeDrug = name;
  setActive('drug', name);
  const drug = ANTIBIOTIC_DB[name];
  if (!drug) { switchTab('drug'); return; }
  const content = document.getElementById('drug-content');

  const isRenal = drug.renal.toUpperCase().includes('CRITICAL') || drug.renal.toUpperCase().includes('CONTRAINDICATED');
  const renalClass = isRenal ? 'crit' : 'warn';

  const adrHtml = drug.adr.map(a => `<div class="adr-item">${a}</div>`).join('');

  const ciHtml = drug.ci.map(([desc, sev]) => {
    const sevLower = sev.toLowerCase();
    const cls = sevLower.startsWith('high') || sevLower.startsWith('absolute') ? 'high' : sevLower.startsWith('moderate') ? 'moderate' : 'low';
    return `<div class="ci-item">
      <span class="ci-badge ${cls}">${sevLower.startsWith('absolute') ? '🚫 ABSOLUTE' : sevLower.startsWith('high') ? '⛔ HIGH' : sevLower.startsWith('moderate') ? '⚠ MODERATE' : '⚡ LOW'}</span>
      <div class="ci-desc">${desc}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${sev}</div>
    </div>`;
  }).join('');

  content.innerHTML = `
    <div class="drug-name">${name}</div>
    <div class="drug-class">${drug.class}</div>

    <div class="card">
      <div class="card-body">
        <div class="info-row"><span class="info-label">DOSE</span><span class="info-val">${drug.dose}</span></div>
        <div class="renal-alert ${renalClass}">
          <span>🫘</span>
          <span><strong>Renal:</strong> ${drug.renal}</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Adverse Effects</span></div>
      <div class="card-body">${adrHtml}</div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Contraindications</span></div>
      <div class="card-body">
        ${ciHtml}
        <div class="alt-box"><span class="alt-label">If Contraindicated — Use Instead:</span>${drug.alt_if_ci}</div>
      </div>
    </div>

    ${buildScreener([name])}
  `;
}

// ── Screener builder ──
function buildScreener(drugs) {
  const relevant = CI_SCREENER_OPTIONS.filter(opt => drugs.some(d => opt.drugCIs[d]));
  if (relevant.length === 0) return '';

  const checks = relevant.map(opt =>
    `<div class="ci-check">
      <input type="checkbox" id="ci-${opt.key}" onchange="runScreener(${JSON.stringify(drugs)})">
      <label for="ci-${opt.key}">${opt.label}</label>
    </div>`
  ).join('');

  return `
    <div class="screener">
      <h3>Contraindication Screener</h3>
      <p style="font-size:11px;color:var(--text-muted);margin-bottom:10px;">Check all that apply for this patient — flagged drugs will be highlighted.</p>
      ${checks}
      <div class="screener-result" id="screener-result"></div>
    </div>`;
}

function runScreener(drugs) {
  const resultEl = document.getElementById('screener-result');
  if (!resultEl) return;
  const flags = {};
  CI_SCREENER_OPTIONS.forEach(opt => {
    const el = document.getElementById('ci-' + opt.key);
    if (el && el.checked) {
      drugs.forEach(d => {
        if (opt.drugCIs[d]) {
          if (!flags[d]) flags[d] = [];
          flags[d].push({ci: opt.label, sev: opt.drugCIs[d]});
        }
      });
    }
  });

  resultEl.style.display = 'block';
  if (Object.keys(flags).length === 0) {
    resultEl.innerHTML = '<div class="ci-ok">✓ No flagged contraindications for selected conditions</div>';
    return;
  }

  let html = '';
  Object.entries(flags).forEach(([drug, issues]) => {
    issues.forEach(issue => {
      html += `<div class="ci-flag">
        <div class="drug-label">⛔ ${drug}</div>
        <div class="ci-reason">${issue.ci}</div>
        <div class="ci-sev">Severity: ${issue.sev}</div>
        ${ANTIBIOTIC_DB[drug] ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Alternative: ${ANTIBIOTIC_DB[drug].alt_if_ci}</div>` : ''}
      </div>`;
    });
  });
  resultEl.innerHTML = html;
}

// ── Initialize ──
buildLists();
</script>
</body>
</html>
